<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Экономика Австралии</title>
<link rel="stylesheet" href="base-style.css">
</head>
<body>
<header>Австралия — Лаборатория «Занимательная математика с ИИ»</header>
  <div class="container">
    <div class="card">
        <h3>Привет! После скачивания app.txt измени расширение на exe,<br> запусти app.exe и в браузере набери http://localhost:5000</h3>
          <button onclick="downloadTXT()">Скачай экономическую модель Австралии</button>
    </div>
</div>
<script>
function downloadTXT() {
    const text = "Привет! Это мой файл.\nСоздан на сайте.";

    const blob = new Blob([text], { type: "text/plain" });

    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "app.txt";

    link.click();
}
</script>
<footer>© 2025 — «Занимательная математика с ИИ»</footer>
</body>
</html>
